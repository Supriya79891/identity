<!DOCTYPE html>
<html>
<head>
<title>Rapuru Supriya | Software Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(-45deg,#667eea,#764ba2,#ff6a88,#ff99ac);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
color:white;
text-align:center;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
margin-top:50px;
animation:fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

img{
width:170px;
height:170px;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 25px white;
transition:0.4s;
}

img:hover{
transform:scale(1.1);
box-shadow:0 0 40px yellow;
}

h1{
font-size:40px;
margin-top:20px;
}

h3{
font-weight:300;
margin-bottom:20px;
}

.skills span{
display:inline-block;
background:white;
color:#333;
padding:8px 15px;
margin:5px;
border-radius:20px;
transition:0.3s;
}

.skills span:hover{
background:#ff6a88;
color:white;
transform:scale(1.1);
}

button{
padding:10px 20px;
border:none;
border-radius:25px;
background:white;
color:#764ba2;
font-weight:bold;
cursor:pointer;
margin:10px;
transition:0.3s;
}

button:hover{
background:#ff6a88;
color:white;
transform:scale(1.1);
}

.footer{
margin-top:40px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<img src="photo.jpg">

<h1>Rapuru Supriya</h1>
<h3>Software Engineer | Full Stack Developer</h3>

<div class="skills">
<span>Python</span>
<span>Java</span>
<span>HTML</span>
<span>CSS</span>
<span>JavaScript</span>
<span>Data Science</span>
<span>SQL</span>
</div>

<br>

<button onclick="window.location.href='https://github.com/Supriya79891'">
GitHub
</button>

<button onclick="window.location.href='mailto:supriya@gmail.com'">
Contact Me
</button>

<div class="footer">
<p>📍 Nellore, Andhra Pradesh</p>
<p>© 2026 Rapuru Supriya</p>
</div>

</div>

</body>
</html>
